<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wolf Audet — wolf.sh</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<style>
  :root {
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --ink: #0e0e0d;
    --paper: #f5f3ee;
    --paper-2: #ebe8e1;
    --muted: #7a7770;
    --line: rgba(14,14,13,.14);
    --accent: #d44a1c;
    --green: #2f7a4a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f0eee9; color: var(--ink); }
  body {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: var(--mono); }

  ::selection { background: var(--ink); color: var(--paper); }

  /* shared atoms used across the three artboards */
  .mono { font-family: var(--mono); }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .kbd {
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 5px;
    border: .5px solid var(--line);
    border-radius: 3px;
    background: rgba(14,14,13,.04);
    color: var(--muted);
  }
  .reveal {
    position: relative;
    transition: color .15s ease;
  }
  .reveal::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 1px;
    background: currentColor;
    opacity: .25;
    transition: opacity .15s ease;
  }
  .reveal:hover::after { opacity: 1; }
  .reveal:hover { color: var(--accent); }

  /* blinking cursor */
  .cursor::after {
    content: "▌";
    margin-left: 2px;
    animation: blink 1.1s steps(1, end) infinite;
    color: currentColor;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* dotted/striped placeholder image */
  .img-placeholder {
    background:
      repeating-linear-gradient(135deg,
        rgba(255,255,255,.07) 0 1px,
        transparent 1px 8px),
      #1a1a18;
    color: rgba(255,255,255,.55);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .img-placeholder::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: .5px dashed rgba(255,255,255,.18);
  }
  .img-placeholder .meta {
    position: absolute;
    bottom: 16px; left: 18px; right: 18px;
    display: flex;
    justify-content: space-between;
    color: rgba(255,255,255,.55);
  }

  /* toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translate(-50%, -8px);
    background: var(--ink);
    color: var(--paper);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s cubic-bezier(.2,.7,.2,1);
    z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* status dot */
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 8px;
    vertical-align: 1px;
    box-shadow: 0 0 0 0 var(--green);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--green) 60%, transparent); }
    70%  { box-shadow: 0 0 0 8px color-mix(in oklab, var(--green) 0%, transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--green) 0%, transparent); }
  }

  /* glyph-shuffle text — animates one-shot on hover via JS */
  .shuffle { cursor: default; }

  .manpage { padding: 24px 24px 20px; }
  @media (max-width: 600px) {
    .manpage { padding: 16px 16px 12px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>

</html>
